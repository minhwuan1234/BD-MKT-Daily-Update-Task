name: Collect Evening Report

on:
  repository_dispatch:
    types: [evening-submitted]

jobs:
  notify-pm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Notify PM
        env:
          LARK_APP_ID:     ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, os, datetime, pathlib

          APP_ID     = os.environ['LARK_APP_ID']
          APP_SECRET = os.environ['LARK_APP_SECRET']

          USER_ID = '${{ github.event.client_payload.userId }}'
          DATE    = '${{ github.event.client_payload.date }}'
          FILE    = '${{ github.event.client_payload.filePath }}'

          def lark_post(url, payload, token=None):
              data = json.dumps(payload).encode()
              headers = {'Content-Type': 'application/json'}
              if token:
                  headers['Authorization'] = f'Bearer {token}'
              req = urllib.request.Request(url, data=data, headers=headers, method='POST')
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          auth = lark_post(
              'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal',
              {'app_id': APP_ID, 'app_secret': APP_SECRET}
          )
          token = auth.get('tenant_access_token')
          if not token:
              print(f'ERROR: Cannot get token. Response: {auth}')
              exit(1)

          with open('members.json') as f:
              members = json.load(f)

          id_to_name = {v['id']: k for k, v in members.items()}
          id_to_pm   = {v['id']: v.get('pm', []) for k, v in members.items()}

          name   = id_to_name.get(USER_ID, USER_ID)
          pm_ids = id_to_pm.get(USER_ID, [])
          if isinstance(pm_ids, str):
              pm_ids = [pm_ids] if pm_ids else []

          if not pm_ids:
              print(f'{name} has no PM assigned, skipping.')
              exit(0)

          try:
              with open(FILE) as f:
                  report = json.load(f)
          except Exception as e:
              print(f'Could not read {FILE}: {e}')
              exit(1)

          submitted_at = report.get('submittedAt', '')
          try:
              dt = datetime.datetime.fromisoformat(submitted_at.replace('Z', '+00:00'))
              dt_vn = dt + datetime.timedelta(hours=7)
              time_str = dt_vn.strftime('%d/%m/%Y %H:%M (GMT+7)')
          except:
              time_str = submitted_at

          try:
              d = datetime.datetime.strptime(DATE, '%Y-%m-%d')
              date_str = d.strftime('%d/%m/%Y')
          except:
              date_str = DATE

          # Weekly goal tu thu 2
          def get_monday_str(date_str):
              d = datetime.datetime.strptime(date_str, '%Y-%m-%d')
              diff = -6 if d.weekday() == 6 else (0 - d.weekday())
              mon = d + datetime.timedelta(days=diff)
              return mon.strftime('%Y-%m-%d')

          weekly_goal = None
          try:
              monday_str = get_monday_str(DATE)
              monday_file = pathlib.Path(f'reports/{monday_str}/morning/{USER_ID}.json')
              if monday_file.exists():
                  with open(monday_file) as f:
                      monday_report = json.load(f)
                  weekly_goal = monday_report.get('weeklyGoal')
          except:
              pass

          tasks = report.get('tasks', [])

          # Dem so nguoi da submit chieu
          evening_dir = pathlib.Path(f'reports/{DATE}/evening')
          submitted_count = len(list(evening_dir.glob('*.json'))) if evening_dir.exists() else 1
          total = len([v for v in members.values() if pm_ids[0] in (v.get('pm') or [])])

          # Build elements
          elements = [
            {
              "tag": "div",
              "text": {
                "tag": "lark_md",
                "content": f"👤 **{name}** vừa submit\n🕐 {time_str}"
              }
            },
            {"tag": "hr"}
          ]

          # Weekly goal
          if weekly_goal:
              elements.append({
                "tag": "div",
                "text": {"tag": "lark_md", "content": f"🎯 **Goal tuần này:**\n{weekly_goal}"}
              })
              elements.append({"tag": "hr"})

          # Tasks
          for i, t in enumerate(tasks, 1):
              title      = t.get('title', '?')
              progress   = t.get('progress', '—')
              time_spent = t.get('timeSpent', '—')
              steps      = t.get('steps', [])

              # Emoji progress tong
              try:
                  prog_val = int(progress.replace('%', ''))
                  if prog_val == 100:   prog_emoji = '🟢'
                  elif prog_val >= 60:  prog_emoji = '🟡'
                  else:                 prog_emoji = '🔴'
              except:
                  prog_emoji = '⚪'

              elements.append({
                "tag": "div",
                "text": {
                  "tag": "lark_md",
                  "content": f"**{i}. {title}**\n{prog_emoji} Tiến độ tổng: **{progress}**　⏱ Thực tế: {time_spent}"
                }
              })

              # Step progress
              if steps:
                  step_lines = []
                  for si, step in enumerate(steps, 1):
                      what     = step.get('what', '?')
                      s_prog   = step.get('progress', '—')
                      try:
                          sp_val  = int(s_prog.replace('%', ''))
                          s_emoji = '✅' if sp_val == 100 else ('🔶' if sp_val >= 50 else '⬜')
                      except:
                          s_emoji = '⬜'
                      step_lines.append(f"  {s_emoji} {si}. {what} — _{s_prog}_")
                  elements.append({
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": '\n'.join(step_lines)
                    }
                  })

              elements.append({"tag": "hr"})

          # Blockers — LUON HIEN neu co
          blockers = report.get('blockers')
          if blockers:
              elements.append({
                "tag": "div",
                "text": {"tag": "lark_md", "content": f"🚧 **Khó khăn:**\n{blockers}"}
              })
              elements.append({"tag": "hr"})

          # Tomorrow plan — LUON HIEN neu co
          tomorrow_plan = report.get('tomorrowPlan')
          if tomorrow_plan:
              elements.append({
                "tag": "div",
                "text": {"tag": "lark_md", "content": f"📋 **Kế hoạch ngày mai:**\n{tomorrow_plan}"}
              })
              elements.append({"tag": "hr"})

          # Footer submit count
          elements.append({
            "tag": "note",
            "elements": [
              {
                "tag": "plain_text",
                "content": f"✅ Đã submit chiều: {submitted_count}/{total} thành viên hôm nay"
              }
            ]
          })

          card = {
            "header": {
              "title": {
                "tag": "plain_text",
                "content": f"🌿 Update tình hình — {date_str}"
              },
              "template": "indigo"
            },
            "elements": elements
          }

          for pm_id in pm_ids:
              result = lark_post(
                  'https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=open_id',
                  {
                      'receive_id': pm_id,
                      'msg_type':   'interactive',
                      'content':    json.dumps(card),
                  },
                  token=token
              )
              print(f'Notified PM {pm_id} for {name}: code={result.get("code","?")} msg={result.get("msg","")}')
          PYEOF
