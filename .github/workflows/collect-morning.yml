name: Collect Morning Report

on:
  repository_dispatch:
    types: [morning-submitted]

jobs:
  notify-pm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pull latest (worker vừa commit file)
      - name: Pull latest
        run: git pull --rebase origin main

      - name: Notify PM
        env:
          LARK_APP_ID:     ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          PM_IDS:          ${{ secrets.PM_IDS }}    # JSON array: ["ou_xxx","ou_yyy",...]
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, os

          APP_ID     = os.environ['LARK_APP_ID']
          APP_SECRET = os.environ['LARK_APP_SECRET']
          PM_IDS     = json.loads(os.environ['PM_IDS'])

          # Payload từ repository_dispatch
          USER_ID  = '${{ github.event.client_payload.userId }}'
          DATE     = '${{ github.event.client_payload.date }}'
          FILE     = '${{ github.event.client_payload.filePath }}'

          def lark_post(url, payload, token=None):
              data = json.dumps(payload).encode()
              headers = {'Content-Type': 'application/json'}
              if token:
                  headers['Authorization'] = f'Bearer {token}'
              req = urllib.request.Request(url, data=data, headers=headers, method='POST')
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          # tenant_access_token
          auth  = lark_post(
              'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal',
              {'app_id': APP_ID, 'app_secret': APP_SECRET}
          )
          token = auth['tenant_access_token']

          # Load members để lookup tên
          with open('members.json') as f:
              members = json.load(f)
          id_to_name = {v: k for k, v in members.items()}
          name = id_to_name.get(USER_ID, USER_ID)

          # Load report file
          try:
              with open(FILE) as f:
                  report = json.load(f)
          except Exception as e:
              print(f'Could not read {FILE}: {e}')
              exit(1)

          tasks = report.get('tasks', [])
          task_lines = []
          for t in tasks:
              if 'title' in t:
                  task_lines.append(f"  • {t['title']}")
              elif 'subtask' in t:
                  task_lines.append(f"  📎 Task phụ: {t['subtask']}")
          tasks_text = '\n'.join(task_lines) if task_lines else '  (không có task)'

          submitted_at = report.get('submittedAt', '')

          msg = (
              f"☀️ *Báo cáo sáng mới* — {name}\n"
              f"📅 {DATE}  🕐 {submitted_at[11:16]} (VN)\n\n"
              f"*Tasks hôm nay:*\n{tasks_text}"
          )

          for pm_id in PM_IDS:
              result = lark_post(
                  'https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=open_id',
                  {
                      'receive_id': pm_id,
                      'msg_type':   'text',
                      'content':    json.dumps({'text': msg}),
                  },
                  token=token
              )
              print(f'Notified PM {pm_id}: code={result.get("code","?")}')
          PYEOF
