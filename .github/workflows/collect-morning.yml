name: Collect Morning Report

on:
  repository_dispatch:
    types: [morning-submitted]

jobs:
  notify-pm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Notify PM
        env:
          LARK_APP_ID:     ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}

        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, urllib.error, os, datetime, pathlib

          APP_ID     = os.environ['LARK_APP_ID']
          APP_SECRET = os.environ['LARK_APP_SECRET']

          USER_ID = '${{ github.event.client_payload.userId }}'
          DATE    = '${{ github.event.client_payload.date }}'
          FILE    = '${{ github.event.client_payload.filePath }}'

          def lark_post(url, payload, token=None):
              data = json.dumps(payload).encode()
              headers = {'Content-Type': 'application/json'}
              if token:
                  headers['Authorization'] = f'Bearer {token}'
              req = urllib.request.Request(url, data=data, headers=headers, method='POST')
              try:
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())
              except urllib.error.HTTPError as e:
                  body = e.read().decode()
                  print(f'HTTP {e.code} error for {url}')
                  print(f'Response body: {body}')
                  raise

          auth = lark_post(
              'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal',
              {'app_id': APP_ID, 'app_secret': APP_SECRET}
          )
          print(f'Auth response: {auth}')
          token = auth.get('tenant_access_token')
          if not token:
              print(f'ERROR: Cannot get token. Response: {auth}')
              exit(1)

          with open('members.json') as f:
              members = json.load(f)

          id_to_name = {v['id']: k for k, v in members.items()}
          id_to_pm   = {v['id']: v.get('pm', []) for k, v in members.items()}

          name   = id_to_name.get(USER_ID, USER_ID)
          pm_ids = id_to_pm.get(USER_ID, [])
          if isinstance(pm_ids, str):
              pm_ids = [pm_ids] if pm_ids else []

          if not pm_ids:
              print(f'{name} has no PM assigned, skipping.')
              exit(0)

          try:
              with open(FILE) as f:
                  report = json.load(f)
          except Exception as e:
              print(f'Could not read {FILE}: {e}')
              exit(1)

          submitted_at = report.get('submittedAt', '')
          try:
              dt = datetime.datetime.fromisoformat(submitted_at.replace('Z', '+00:00'))
              dt_vn = dt + datetime.timedelta(hours=7)
              time_str = dt_vn.strftime('%d/%m/%Y %H:%M (GMT+7)')
          except:
              time_str = submitted_at

          try:
              d = datetime.datetime.strptime(DATE, '%Y-%m-%d')
              date_str = d.strftime('%d/%m/%Y')
          except:
              date_str = DATE

          # Weekly goal tu thu 2
          def get_monday_str(date_str):
              d = datetime.datetime.strptime(date_str, '%Y-%m-%d')
              diff = -6 if d.weekday() == 6 else (0 - d.weekday())
              mon = d + datetime.timedelta(days=diff)
              return mon.strftime('%Y-%m-%d')

          weekly_goal = None
          try:
              monday_str = get_monday_str(DATE)
              monday_file = pathlib.Path(f'reports/{monday_str}/morning/{USER_ID}.json')
              if monday_file.exists():
                  with open(monday_file) as f:
                      monday_report = json.load(f)
                  weekly_goal = monday_report.get('weeklyGoal')
          except:
              pass

          tasks    = report.get('tasks', [])
          blockers = report.get('blockers')

          morning_dir = pathlib.Path(f'reports/{DATE}/morning')
          submitted_count = len(list(morning_dir.glob('*.json'))) if morning_dir.exists() else 1
          total = len([v for v in members.values() if pm_ids[0] in (v.get('pm') or [])])

          form_name = f"review_form_{USER_ID}"

          # Build form elements (JSON 2.0)
          form_elements = [
            {
              "tag": "markdown",
              "content": f"👤 **{name}** vừa submit\n🕐 {time_str}"
            },
            {"tag": "hr"}
          ]

          # Blockers — hien truoc tasks de PM chu y truoc
          if blockers:
              form_elements.append({
                "tag": "markdown",
                "content": f"🚧 **Khó khăn / Cần hỗ trợ:**\n{blockers}"
              })
              form_elements.append({"tag": "hr"})

          # Weekly goal
          if weekly_goal:
              form_elements.append({
                "tag": "markdown",
                "content": f"🎯 **Goal tuần này:**\n{weekly_goal}"
              })
              form_elements.append({"tag": "hr"})

          # Tasks + review form
          for i, t in enumerate(tasks):
              title         = t.get('title', '?')
              output        = t.get('output', '—')
              expected_time = t.get('expectedTime', '—')
              steps         = t.get('steps', [])
              step_text = ""
              if steps:
                  step_lines = []
                  for si, step in enumerate(steps, 1):
                      what  = step.get('what', '?')
                      s_out = step.get('output', '—')
                      line  = f"  {si}. {what}"
                      if s_out and s_out != '—':
                          line += f" → {s_out}"
                      step_lines.append(line)
                  step_text = "\n" + "\n".join(step_lines)

              form_elements.append({
                "tag": "markdown",
                "content": f"**{i+1}. {title}**\n📦 Output: {output}　⏱ Dự kiến: {expected_time}{step_text}"
              })
              form_elements.append({
                "tag": "select_static",
                "name": f"decision_{i}",
                "placeholder": {"tag": "plain_text", "content": "Chọn quyết định..."},
                "options": [
                  {"text": {"tag": "plain_text", "content": "✅ Đồng ý"},  "value": "approved"},
                  {"text": {"tag": "plain_text", "content": "👀 Xem lại"}, "value": "review"},
                  {"text": {"tag": "plain_text", "content": "❌ Từ chối"}, "value": "rejected"},
                ]
              })
              form_elements.append({
                "tag": "input",
                "name": f"reason_{i}",
                "placeholder": {"tag": "plain_text", "content": "Feedback / lý do (không bắt buộc)..."},
                "max_length": 300
              })
              form_elements.append({"tag": "hr"})

          # Submit button — embed userId + date vao name
          submit_name = f"submit__{USER_ID}__{DATE}"
          form_elements.append({
            "tag": "button",
            "name": submit_name,
            "text": {"tag": "plain_text", "content": "📨 Gửi review"},
            "type": "primary",
            "width": "fill",
            "form_action_type": "submit"
          })

          # JSON 2.0 card
          card_v2 = {
            "schema": "2.0",
            "header": {
              "title": {"tag": "plain_text", "content": f"☀️ Kế hoạch sáng — {date_str}"},
              "template": "green"
            },
            "body": {
              "elements": [{
                "tag": "form",
                "name": form_name,
                "elements": form_elements
              }]
            }
          }

          for pm_id in pm_ids:
              result = lark_post(
                  'https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=open_id',
                  {
                      'receive_id': pm_id,
                      'msg_type':   'interactive',
                      'content':    json.dumps(card_v2),
                  },
                  token=token
              )
              print(f'Notified PM {pm_id} for {name}: code={result.get("code","?")} msg={result.get("msg","")}')
          PYEOF
