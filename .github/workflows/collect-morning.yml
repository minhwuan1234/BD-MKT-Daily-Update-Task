name: Collect Morning Report

on:
  repository_dispatch:
    types: [morning-submitted]

jobs:
  notify-pm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Notify PM
        env:
          LARK_APP_ID:     ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          WORKER_URL:      ${{ secrets.WORKER_URL }}
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, os, datetime, pathlib

          APP_ID     = os.environ['LARK_APP_ID']
          APP_SECRET = os.environ['LARK_APP_SECRET']
          WORKER_URL = os.environ.get('WORKER_URL', '')

          USER_ID = '${{ github.event.client_payload.userId }}'
          DATE    = '${{ github.event.client_payload.date }}'
          FILE    = '${{ github.event.client_payload.filePath }}'

          def lark_post(url, payload, token=None):
              data = json.dumps(payload).encode()
              headers = {'Content-Type': 'application/json'}
              if token:
                  headers['Authorization'] = f'Bearer {token}'
              req = urllib.request.Request(url, data=data, headers=headers, method='POST')
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          auth = lark_post(
              'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal',
              {'app_id': APP_ID, 'app_secret': APP_SECRET}
          )
          print(f'Auth response: {auth}')
          token = auth.get('tenant_access_token')
          if not token:
              print(f'ERROR: Cannot get token. Response: {auth}')
              exit(1)

          with open('members.json') as f:
              members = json.load(f)

          id_to_name = {v['id']: k for k, v in members.items()}
          id_to_pm   = {v['id']: v.get('pm') for k, v in members.items()}

          name  = id_to_name.get(USER_ID, USER_ID)
          pm_id = id_to_pm.get(USER_ID)

          if not pm_id:
              print(f'{name} has no PM assigned, skipping.')
              exit(0)

          try:
              with open(FILE) as f:
                  report = json.load(f)
          except Exception as e:
              print(f'Could not read {FILE}: {e}')
              exit(1)

          submitted_at = report.get('submittedAt', '')
          try:
              dt = datetime.datetime.fromisoformat(submitted_at.replace('Z', '+00:00'))
              dt_vn = dt + datetime.timedelta(hours=7)
              time_str = dt_vn.strftime('%d/%m/%Y %H:%M (GMT+7)')
          except:
              time_str = submitted_at

          try:
              d = datetime.datetime.strptime(DATE, '%Y-%m-%d')
              date_str = d.strftime('%d/%m/%Y')
          except:
              date_str = DATE

          # Weekly goal từ thứ 2
          def get_monday_str(date_str):
              d = datetime.datetime.strptime(date_str, '%Y-%m-%d')
              diff = -6 if d.weekday() == 6 else (0 - d.weekday())
              mon = d + datetime.timedelta(days=diff)
              return mon.strftime('%Y-%m-%d')

          weekly_goal = None
          try:
              monday_str = get_monday_str(DATE)
              monday_file = pathlib.Path(f'reports/{monday_str}/morning/{USER_ID}.json')
              if monday_file.exists():
                  with open(monday_file) as f:
                      monday_report = json.load(f)
                  weekly_goal = monday_report.get('weeklyGoal')
          except:
              pass

          tasks = report.get('tasks', [])

          # Build task elements với steps breakdown
          task_elements = []
          for i, t in enumerate(tasks, 1):
              title        = t.get('title', '?')
              output       = t.get('output', '—')
              expected_time = t.get('expectedTime', '—')
              steps        = t.get('steps', [])

              # Task header
              task_elements.append({
                "tag": "div",
                "text": {
                  "tag": "lark_md",
                  "content": f"**{i}. {title}**\n📦 Output: {output}　⏱ Dự kiến: {expected_time}"
                }
              })

              # Steps breakdown
              if steps:
                  step_lines = []
                  for si, step in enumerate(steps, 1):
                      what   = step.get('what', '?')
                      s_out  = step.get('output', '—')
                      step_lines.append(f"  {si}. {what}")
                      if s_out and s_out != '—':
                          step_lines.append(f"     └ Output: _{s_out}_")
                  task_elements.append({
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": '\n'.join(step_lines)
                    }
                  })

              task_elements.append({"tag": "hr"})

          morning_dir = pathlib.Path(f'reports/{DATE}/morning')
          submitted_count = len(list(morning_dir.glob('*.json'))) if morning_dir.exists() else 1
          total = len([v for v in members.values() if v.get('pm') == pm_id])

          # Build card elements
          elements = [
              {
                "tag": "div",
                "text": {
                  "tag": "lark_md",
                  "content": f"👤 **{name}** vừa submit\n🕐 {time_str}"
                }
              },
              {"tag": "hr"}
          ]

          elements += task_elements

          # Blockers
          blockers = report.get('blockers')
          if blockers:
              elements.append({
                "tag": "div",
                "text": {"tag": "lark_md", "content": f"🚧 **Khó khăn:**\n{blockers}"}
              })
              elements.append({"tag": "hr"})

          # Weekly goal
          if weekly_goal:
              elements.append({
                "tag": "div",
                "text": {"tag": "lark_md", "content": f"🎯 **Goal tuần này:**\n{weekly_goal}"}
              })
              elements.append({"tag": "hr"})

          # Approve / Clarify buttons
          callback_url = f'{WORKER_URL}/lark-callback' if WORKER_URL else ''
          elements.append({
            "tag": "action",
            "actions": [
              {
                "tag":  "button",
                "text": {"tag": "plain_text", "content": "✅ Approve"},
                "type": "primary",
                "value": json.dumps({"type": "approve", "userId": USER_ID, "date": DATE}),
                **({"url": callback_url} if callback_url else {}),
              },
              {
                "tag":  "button",
                "text": {"tag": "plain_text", "content": "💬 Cần clarify"},
                "type": "default",
                "value": json.dumps({"type": "clarify", "userId": USER_ID, "date": DATE}),
                **({"url": callback_url} if callback_url else {}),
              },
            ]
          })

          elements.append({
            "tag": "note",
            "elements": [
              {
                "tag": "plain_text",
                "content": f"✅ Đã submit: {submitted_count}/{total} thành viên hôm nay"
              }
            ]
          })

          card = {
            "header": {
              "title": {
                "tag": "plain_text",
                "content": f"☀️ Kế hoạch sáng — {date_str}"
              },
              "template": "green"
            },
            "elements": elements
          }

          result = lark_post(
              'https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=open_id',
              {
                  'receive_id': pm_id,
                  'msg_type':   'interactive',
                  'content':    json.dumps(card),
              },
              token=token
          )
          print(f'Notified PM {pm_id} for {name}: code={result.get("code","?")} msg={result.get("msg","")}')
          PYEOF
