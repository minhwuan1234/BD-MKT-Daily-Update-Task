name: Collect Morning Report

on:
  repository_dispatch:
    types: [morning-submitted]

jobs:
  notify-pm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull latest
        run: git pull --rebase origin main

      - name: Notify PM
        env:
          LARK_APP_ID:     ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          PM_IDS:          ${{ secrets.PM_IDS }}
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, os, datetime, pathlib

          APP_ID     = os.environ['LARK_APP_ID']
          APP_SECRET = os.environ['LARK_APP_SECRET']
          PM_IDS     = json.loads(os.environ['PM_IDS'])

          USER_ID = '${{ github.event.client_payload.userId }}'
          DATE    = '${{ github.event.client_payload.date }}'
          FILE    = '${{ github.event.client_payload.filePath }}'

          def lark_post(url, payload, token=None):
              data = json.dumps(payload).encode()
              headers = {'Content-Type': 'application/json'}
              if token:
                  headers['Authorization'] = f'Bearer {token}'
              req = urllib.request.Request(url, data=data, headers=headers, method='POST')
              with urllib.request.urlopen(req) as r:
                  return json.loads(r.read())

          # ── Get token ──
          auth = lark_post(
              'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal',
              {'app_id': APP_ID, 'app_secret': APP_SECRET}
          )
          print(f'Auth response: {auth}')
          token = auth.get('tenant_access_token')
          if not token:
              print(f'ERROR: Cannot get token. Response: {auth}')
              exit(1)

          with open('members.json') as f:
              members = json.load(f)
          id_to_name = {v: k for k, v in members.items()}
          name = id_to_name.get(USER_ID, USER_ID)

          try:
              with open(FILE) as f:
                  report = json.load(f)
          except Exception as e:
              print(f'Could not read {FILE}: {e}')
              exit(1)

          # Format thời gian VN
          submitted_at = report.get('submittedAt', '')
          try:
              dt = datetime.datetime.fromisoformat(submitted_at.replace('Z', '+00:00'))
              dt_vn = dt + datetime.timedelta(hours=7)
              time_str = dt_vn.strftime('%d/%m/%Y %H:%M (GMT+7)')
          except:
              time_str = submitted_at

          # Format date
          try:
              d = datetime.datetime.strptime(DATE, '%Y-%m-%d')
              date_str = d.strftime('%d/%m/%Y')
          except:
              date_str = DATE

          # Build task lines
          tasks = report.get('tasks', [])
          task_lines = []
          for t in tasks:
              if 'title' in t:
                  task_lines.append(f"📌 {t['title']}")

          tasks_md = '\n'.join(task_lines) if task_lines else '(không có task)'

          # Blockers
          blockers = report.get('blockers')

          # Đếm submit
          morning_dir = pathlib.Path(f'reports/{DATE}/morning')
          submitted_count = len(list(morning_dir.glob('*.json'))) if morning_dir.exists() else 1
          total = len(members)

          # Build card elements
          elements = [
              {
                "tag": "div",
                "text": {
                  "tag": "lark_md",
                  "content": f"👤 **{name}** vừa submit\n🕐 {time_str}"
                }
              },
              {"tag": "hr"},
              {
                "tag": "div",
                "text": {
                  "tag": "lark_md",
                  "content": tasks_md
                }
              }
          ]

          if blockers:
              elements += [
                  {"tag": "hr"},
                  {
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": f"🚧 **Khó khăn:**\n{blockers}"
                    }
                  }
              ]

          elements += [
              {"tag": "hr"},
              {
                "tag": "note",
                "elements": [
                  {
                    "tag": "plain_text",
                    "content": f"✅ Đã submit: {submitted_count}/{total} thành viên hôm nay"
                  }
                ]
              }
          ]

          card = {
            "header": {
              "title": {
                "tag": "plain_text",
                "content": f"☀️ Kế hoạch sáng — {date_str}"
              },
              "template": "green"
            },
            "elements": elements
          }

          for pm_id in PM_IDS:
              result = lark_post(
                  'https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=open_id',
                  {
                      'receive_id': pm_id,
                      'msg_type':   'interactive',
                      'content':    json.dumps(card),
                  },
                  token=token
              )
              print(f'Notified PM {pm_id}: code={result.get("code","?")} msg={result.get("msg","")}')
          PYEOF
