name: Evening Send

on:
  workflow_dispatch: {}

jobs:
  send-evening-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send evening links via Lark
        env:
          LARK_APP_ID:     ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          PAGES_BASE_URL:  ${{ secrets.PAGES_BASE_URL }}
          MEMBER_IDS:      ${{ secrets.MEMBER_IDS }}
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, os, datetime, pathlib, time

          APP_ID     = os.environ['LARK_APP_ID']
          APP_SECRET = os.environ['LARK_APP_SECRET']
          BASE_URL   = os.environ['PAGES_BASE_URL'].rstrip('/')
          MEMBER_IDS = json.loads(os.environ['MEMBER_IDS'])

          def lark_post(url, payload, token=None):
          data = json.dumps(payload).encode()
          headers = {'Content-Type': 'application/json'}
          if token:
          headers['Authorization'] = f'Bearer {token}'
          req = urllib.request.Request(url, data=data, headers=headers, method='POST')
          try:
          with urllib.request.urlopen(req) as r:
            return json.loads(r.read())
          except urllib.error.HTTPError as e:
          body = e.read().decode()
          print(f'HTTP Error {e.code} for {url}: {body}')
          raise

          auth = lark_post(
              'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal',
              {'app_id': APP_ID, 'app_secret': APP_SECRET}
          )
          print(f'Auth response: {auth}')
          token = auth.get('tenant_access_token')
          if not token:
              print(f'ERROR: Cannot get token. Response: {auth}')
              exit(1)
          print(f'Got token: {token[:8]}...')

          tz_offset = datetime.timezone(datetime.timedelta(hours=7))
          now       = datetime.datetime.now(tz_offset)
          today_key = now.strftime('%Y-%m-%d')
          today     = now.strftime('%d/%m/%Y')
          day_vn    = {0:'Thứ 2',1:'Thứ 3',2:'Thứ 4',3:'Thứ 5',4:'Thứ 6',5:'Thứ 7',6:'Chủ nhật'}
          day_name  = day_vn.get(now.weekday(), '')

          morning_dir = pathlib.Path(f'reports/{today_key}/morning')
          if not morning_dir.exists():
              print(f'No morning reports for {today_key}, skipping.')
              exit(0)

          submitted_ids = [p.stem for p in morning_dir.glob('*.json')]
          target_ids    = [i for i in submitted_ids if i in MEMBER_IDS]

          if not target_ids:
              print('Nobody in MEMBER_IDS submitted morning report.')
              exit(0)

          with open('members.json') as f:
              members = json.load(f)
          id_to_name = {v['id']: k for k, v in members.items()}

          for open_id in target_ids:
              name = id_to_name.get(open_id, open_id)
              ts   = int(time.time())
              link = f'{BASE_URL}/evening.html?userId={open_id}&t={ts}'

              morning_file = morning_dir / f'{open_id}.json'
              task_lines = []
              try:
                  with open(morning_file) as f:
                      morning = json.load(f)
                  main_tasks = [t for t in morning.get('tasks', []) if 'title' in t]
                  for i, t in enumerate(main_tasks, 1):
                      task_lines.append(f"{i}. {t['title']}")
              except:
                  pass

              tasks_text = '\n'.join(task_lines) if task_lines else 'Xem lại trong form nhé'
              task_count = len(task_lines)

              card = {
                "header": {
                  "title": {
                    "tag": "plain_text",
                    "content": f"🌙 Update tình hình — {day_name} {today}"
                  },
                  "template": "indigo"
                },
                "elements": [
                  {
                    "tag": "div",
                    "text": {
                      "tag": "lark_md",
                      "content": f"Xin chào **{name}**! Hôm nay bạn có **{task_count} task** cần update:"
                    }
                  },
                  {"tag": "hr"},
                  {
                    "tag": "div",
                    "text": {"tag": "lark_md", "content": tasks_text}
                  },
                  {"tag": "hr"},
                  {
                    "tag": "action",
                    "actions": [
                      {
                        "tag": "button",
                        "text": {"tag": "plain_text", "content": "🖊 Điền Daily Report"},
                        "type": "primary",
                        "url": link
                      }
                    ]
                  },
                  {
                    "tag": "note",
                    "elements": [
                      {"tag": "plain_text", "content": "Form sẽ tự điền task của bạn. Chỉ cần chọn progress và submit 🚀"}
                    ]
                  }
                ]
              }

              result = lark_post(
                  'https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=open_id',
                  {
                      'receive_id': open_id,
                      'msg_type':   'interactive',
                      'content':    json.dumps(card),
                  },
                  token=token
              )
              print(f'Sent to {name} ({open_id}): code={result.get("code","?")} msg={result.get("msg","")}')

          print('Evening send done.')
          PYEOF
