<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Report 🌙</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Freeman&family=Rethink+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page-wrapper">
  <div class="card">

    <!-- LEFT PANEL -->
    <div class="left-panel">
      <div class="hero-gif" id="hero-gif"></div>
      <div class="hero-blur"></div>
      <div class="quote-overlay">
        <span class="quote-mark">"</span>
        <p class="quote-text" id="daily-quote"></p>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

      <!-- STATE: Loading -->
      <div id="state-loading" class="state-box">
        <div class="spinner"></div>
        <p>Đang tải báo cáo sáng của bạn...</p>
      </div>

      <!-- STATE: Error -->
      <div id="state-error" class="state-box" style="display:none;">
        <p class="state-icon">⚠️</p>
        <p id="error-msg">Không tìm thấy báo cáo sáng.</p>
        <p class="state-sub">Bạn cần điền báo cáo sáng trước nhé!</p>
      </div>

      <!-- STATE: Success -->
      <div id="state-success" class="state-box" style="display:none;">
        <p class="state-icon">🌙</p>
        <p>Báo cáo chiều của bạn đã được ghi nhận! 🌙</p>
        <p class="state-sub">Cảm ơn bạn, chúc buổi tối vui vẻ! 🎉</p>
      </div>

      <!-- STATE: Form -->
      <div id="state-form" style="display:none; flex-direction:column; gap:32px; width:100%;">

        <div class="form-header">
          <div class="title-row">
            <div class="gap-8">
              <h1 class="form-title">Daily Report<span class="spark">✦</span></h1>
              <p class="form-subtitle">Update tiến độ hôm nay nhé — <span id="today-label"></span></p>
            </div>
            <div class="rocket-icon">🌙</div>
          </div>
        </div>

        <div class="form-body">

          <!-- ── TASK 1 ── -->
          <div class="field-group">
            <label class="field-label">Task 1</label>
            <input class="field-input is-autofilled" type="text" id="task1-title" readonly />
          </div>

          <div class="field-group">
            <label class="field-label">Task 1 — Tiến độ</label>
            <div class="progress-picker" id="picker1" data-value="">
              <button class="progress-btn" data-val="0">0%</button>
              <button class="progress-btn" data-val="10">10%</button>
              <button class="progress-btn" data-val="20">20%</button>
              <button class="progress-btn" data-val="30">30%</button>
              <button class="progress-btn" data-val="40">40%</button>
              <button class="progress-btn" data-val="50">50%</button>
              <button class="progress-btn" data-val="60">60%</button>
              <button class="progress-btn" data-val="70">70%</button>
              <button class="progress-btn" data-val="80">80%</button>
              <button class="progress-btn" data-val="90">90%</button>
              <button class="progress-btn is-done" data-val="100">100%</button>
            </div>
            <div class="progress-track-wrap">
              <div class="progress-track"><div class="progress-fill" id="fill1"></div></div>
              <span class="progress-value-label" id="label1">—</span>
            </div>
          </div>

          <div class="field-group">
            <label class="field-label">Task 1 — Thời gian thực tế</label>
            <div class="select-wrapper">
              <select class="field-select" id="time-select1">
                <option value="">-- Chọn thời gian --</option>
                <option value="0.5">0.5h</option><option value="1">1h</option>
                <option value="1.5">1.5h</option><option value="2">2h</option>
                <option value="2.5">2.5h</option><option value="3">3h</option>
                <option value="3.5">3.5h</option><option value="4">4h</option>
                <option value="4.5">4.5h</option><option value="5">5h</option>
                <option value="5.5">5.5h</option><option value="6">6h</option>
                <option value="6.5">6.5h</option><option value="7">7h</option>
                <option value="7.5">7.5h</option><option value="8">8h</option>
              </select>
              <span class="select-arrow">&#8964;</span>
            </div>
          </div>

          <!-- ── TASK 2 (hiện nếu morning có task2) ── -->
          <div class="field-group" id="group-task2" style="display:none;">
            <label class="field-label">Task 2</label>
            <input class="field-input is-autofilled" type="text" id="task2-title" readonly />
          </div>

          <div class="field-group" id="group-prog2" style="display:none;">
            <label class="field-label">Task 2 — Tiến độ</label>
            <div class="progress-picker" id="picker2" data-value="">
              <button class="progress-btn" data-val="0">0%</button>
              <button class="progress-btn" data-val="10">10%</button>
              <button class="progress-btn" data-val="20">20%</button>
              <button class="progress-btn" data-val="30">30%</button>
              <button class="progress-btn" data-val="40">40%</button>
              <button class="progress-btn" data-val="50">50%</button>
              <button class="progress-btn" data-val="60">60%</button>
              <button class="progress-btn" data-val="70">70%</button>
              <button class="progress-btn" data-val="80">80%</button>
              <button class="progress-btn" data-val="90">90%</button>
              <button class="progress-btn is-done" data-val="100">100%</button>
            </div>
            <div class="progress-track-wrap">
              <div class="progress-track"><div class="progress-fill" id="fill2"></div></div>
              <span class="progress-value-label" id="label2">—</span>
            </div>
          </div>

          <div class="field-group" id="group-time2" style="display:none;">
            <label class="field-label">Task 2 — Thời gian thực tế</label>
            <div class="select-wrapper">
              <select class="field-select" id="time-select2">
                <option value="">-- Chọn thời gian --</option>
                <option value="0.5">0.5h</option><option value="1">1h</option>
                <option value="1.5">1.5h</option><option value="2">2h</option>
                <option value="2.5">2.5h</option><option value="3">3h</option>
                <option value="3.5">3.5h</option><option value="4">4h</option>
                <option value="4.5">4.5h</option><option value="5">5h</option>
                <option value="5.5">5.5h</option><option value="6">6h</option>
                <option value="6.5">6.5h</option><option value="7">7h</option>
                <option value="7.5">7.5h</option><option value="8">8h</option>
              </select>
              <span class="select-arrow">&#8964;</span>
            </div>
          </div>

          <button class="submit-btn" id="submit-btn" type="button">Submit 🌙</button>

        </div>
      </div>

    </div>
  </div>
</div>

<script>
const WORKER_URL   = 'https://daily-standup-proxy.minhwuan889.workers.dev';
const GITHUB_RAW = 'https://raw.githubusercontent.com/minhwuan1234/BD-MKT-Daily-Update-Task/main';

const QUOTES = [
  "It takes a great deal of courage to stand alone even if you believe in something very strongly.",
  "I think I have this thing where everybody has to think I'm the greatest. And if they aren't completely knocked out and dazzled and slightly intimidated by me, I don't feel good about myself.",
  "At the end of the day, it's not about what you have or even what you've accomplished. It's about who you've lifted up, who you've made better.",
  "Some people can't believe in themselves until someone else believes in them first.",
  "Love is the one thing we're capable of perceiving that transcends dimensions of time and space.",
  "Not anyone can become a great artist, but a great artist can come from anywhere."
];

const IMAGES = [
  'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&q=80',
  'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=900&q=80',
  'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=900&q=80',
  'https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=900&q=80',
  'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=900&q=80',
  'https://images.unsplash.com/photo-1518173946687-a4c8892bbd9f?w=900&q=80',
];

const vnDate = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Ho_Chi_Minh' }));
const vnDay  = vnDate.getDay();
const dayIdx = vnDay === 0 ? 5 : (vnDay - 1) % QUOTES.length;

document.getElementById('daily-quote').textContent = QUOTES[dayIdx];
document.getElementById('hero-gif').style.backgroundImage = `url('${IMAGES[dayIdx]}')`;

function getDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function todayLabel() {
  return vnDate.toLocaleDateString('vi-VN', { weekday: 'long', day: '2-digit', month: '2-digit', year: 'numeric' });
}

function showState(name) {
  ['loading', 'error', 'success', 'form'].forEach(s => {
    const el = document.getElementById(`state-${s}`);
    if (!el) return;
    el.style.display = (s === name) ? 'flex' : 'none';
  });
}

// ── Progress pickers ──
function initPicker(pickerId, fillId, labelId) {
  const picker = document.getElementById(pickerId);
  const fill   = document.getElementById(fillId);
  const label  = document.getElementById(labelId);

  picker.querySelectorAll('.progress-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      picker.querySelectorAll('.progress-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const val = btn.dataset.val;
      picker.dataset.value = val;
      fill.style.width = val + '%';
      label.textContent = val + '%';
      if (val == 100) {
        fill.style.background = 'linear-gradient(90deg, #4caf50, #81c784)';
        label.style.color = '#4caf50';
      } else if (val >= 60) {
        fill.style.background = 'linear-gradient(90deg, #FF9333, #ffb347)';
        label.style.color = '#FF9333';
      } else {
        fill.style.background = 'linear-gradient(90deg, #FE8A22, #ffb347)';
        label.style.color = '#FE8A22';
      }
    });
  });
}

initPicker('picker1', 'fill1', 'label1');
initPicker('picker2', 'fill2', 'label2');

function highlightPicker(pickerId) {
  const el = document.getElementById(pickerId);
  el.classList.add('picker-error');
  el.addEventListener('animationend', () => el.classList.remove('picker-error'), { once: true });
}

// ── Init: fetch morning report ──
const userId = new URLSearchParams(location.search).get('userId');

async function init() {
  if (!userId) {
    showState('error');
    document.getElementById('error-msg').textContent = '❌ Link không hợp lệ — thiếu userId.';
    return;
  }

  const dateStr = getDateStr(vnDate);
  const url = `${GITHUB_RAW}/reports/${dateStr}/morning/${userId}.json?t=${Date.now()}`;

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // Lấy tasks chính (có .title, không phải subtask)
    const mainTasks = (data.tasks || []).filter(t => t.title);

    if (!mainTasks.length) throw new Error('Không có task nào trong báo cáo sáng.');

    // Autofill task 1
    document.getElementById('task1-title').value = mainTasks[0].title;
    window._morningTasks = mainTasks;

    // Hiện task 2 nếu có
    if (mainTasks.length >= 2) {
      document.getElementById('task2-title').value = mainTasks[1].title;
      document.getElementById('group-task2').style.display = 'flex';
      document.getElementById('group-prog2').style.display  = 'flex';
      document.getElementById('group-time2').style.display  = 'flex';
    }

    document.getElementById('today-label').textContent = todayLabel();
    showState('form');
  } catch (e) {
    showState('error');
    document.getElementById('error-msg').textContent = `❌ ${e.message}`;
  }
}

init();

// ── Submit ──
document.getElementById('submit-btn').addEventListener('click', async () => {
  const hasTwoTasks = document.getElementById('group-task2').style.display !== 'none';
  const prog1 = document.getElementById('picker1').dataset.value;
  const prog2 = hasTwoTasks ? document.getElementById('picker2').dataset.value : null;
  const time1 = document.getElementById('time-select1').value;
  const time2 = hasTwoTasks ? document.getElementById('time-select2').value : null;

  // Validate
  if (!prog1) { highlightPicker('picker1'); return; }
  if (hasTwoTasks && !prog2) { highlightPicker('picker2'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Đang gửi...';

  const tasks = [
    {
      title: window._morningTasks[0]?.title,
      progress: prog1 + '%',
      timeSpent: time1 ? time1 + 'h' : '—',
    },
    ...(hasTwoTasks ? [{
      title: window._morningTasks[1]?.title,
      progress: prog2 + '%',
      timeSpent: time2 ? time2 + 'h' : '—',
    }] : [])
  ];

  const payload = {
    type: 'evening',
    userId,
    date: getDateStr(vnDate),
    tasks,
    submittedAt: new Date().toISOString(),
  };

  try {
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `Server error ${res.status}`);
    }
    showState('success');
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Submit 🌙';
    alert(`❌ Gửi thất bại: ${e.message}`);
  }
});
</script>

</body>
</html>
