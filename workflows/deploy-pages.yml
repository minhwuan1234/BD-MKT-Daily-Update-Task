name: Deploy Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject WORKER_URL
        env:
          WORKER_URL: ${{ secrets.WORKER_URL }}
        run: |
          sed -i "s|https://daily-standup-proxy.minhwuan889.workers.dev|$WORKER_URL|g" morning.html evening.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
